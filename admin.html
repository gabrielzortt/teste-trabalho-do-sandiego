<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Turbinado | Elegance Perfumes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Montserrat"', 'sans-serif'],
                    },
                    colors: { 
                        gold: { DEFAULT: '#D4AF37', light: '#F9F1D8' },
                        midnight: '#0A0A0A'
                    } 
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans antialiased text-gray-800">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 pb-4 border-b-2 border-gold">
            <h1 class="text-3xl md:text-4xl font-serif font-bold text-midnight tracking-wider">Gestão de Estoque Elegance</h1>
            <a href="index.html" target="_blank" class="text-gold hover:text-midnight transition flex items-center gap-2">
                Ver Loja <i class="fas fa-external-link-alt text-sm"></i>
            </a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-lg shadow-xl sticky top-8 border border-gray-100">
                    <h2 id="form-title" class="text-2xl font-serif mb-6 text-midnight border-b pb-2 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-gold"></i> Novo Produto
                    </h2>
                    
                    <form id="product-form" class="space-y-5">
                        <input type="hidden" id="prod-id">
                        
                        <div class="flex flex-col items-center gap-3 p-4 bg-gray-50 border border-gray-200 rounded-lg">
                            <label class="block text-sm font-bold text-gray-600 self-start">Imagem do Produto</label>
                            
                            <div class="w-40 h-40 bg-white border border-gray-200 rounded flex items-center justify-center overflow-hidden relative shadow-inner">
                                <img id="img-preview" src="" alt="Previsualização" class="hidden w-full h-full object-contain p-1">
                                <div id="img-placeholder" class="text-center text-gray-400 p-2 text-xs font-light">
                                    <i class="fas fa-image text-3xl mb-2 block"></i>
                                    A foto aparecerá aqui
                                </div>
                                <button type="button" id="btn-remove-img" onclick="removeImage()" class="hidden absolute top-1 right-1 bg-red-500 text-white rounded-full h-6 w-6 flex items-center justify-center text-xs hover:bg-red-700 shadow">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>

                            <label class="cursor-pointer bg-white border border-gray-300 text-midnight py-2 px-4 rounded text-xs hover:border-gold hover:text-gold transition shadow-sm">
                                <span><i class="fas fa-upload mr-1"></i> Escolher Foto</span>
                                <input type="file" id="prod-image" accept="image/png, image/jpeg, image/webp" class="hidden" onchange="previewFile()">
                            </label>
                            <p class="text-[10px] text-gray-400 text-center">Use imagens pequenas/otimizadas para não lotar o espaço do navegador.</p>
                        </div>

                        <div class="flex flex-col">
                            <label class="text-sm font-bold text-gray-600 mb-1">Nome do Perfume</label>
                            <input type="text" id="prod-name" placeholder="Ex: Floratta Simple Love" class="border border-gray-200 p-3 rounded focus:ring-1 focus:ring-gold focus:border-gold outline-none" required>
                        </div>
                        
                        <div class="flex flex-col">
                            <label class="text-sm font-bold text-gray-600 mb-1">Marca/Setor</label>
                            <select id="prod-brand" class="border border-gray-200 p-3 rounded focus:ring-1 focus:ring-gold focus:border-gold outline-none bg-white">
                                <option value="boticario">Boticário</option>
                                <option value="brand">Brand (Coleção)</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="flex flex-col">
                                <label class="text-sm font-bold text-gray-600 mb-1">Preço (R$)</label>
                                <input type="number" id="prod-price" step="0.01" placeholder="99,90" class="border border-gray-200 p-3 rounded focus:ring-1 focus:ring-gold focus:border-gold outline-none" required>
                            </div>
                            <div class="flex flex-col">
                                <label class="text-sm font-bold text-gray-600 mb-1">Estoque (Qtd)</label>
                                <input type="number" id="prod-stock" placeholder="0" class="border border-gray-200 p-3 rounded focus:ring-1 focus:ring-gold focus:border-gold outline-none" required>
                            </div>
                        </div>

                        <div class="flex flex-col md:flex-row gap-3 pt-4 border-t mt-6">
                            <button type="button" onclick="resetForm()" class="flex-1 px-5 py-3 border border-gray-300 rounded hover:bg-gray-100 transition text-sm text-gray-600 uppercase tracking-wider font-semibold">
                                Limpar / Novo
                            </button>
                            <button type="submit" class="flex-1 px-5 py-3 bg-midnight text-white rounded hover:bg-gold transition text-sm uppercase tracking-wider font-semibold shadow-lg">
                                Salvar Produto
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-6 md:p-8 rounded-lg shadow-xl border border-gray-100">
                    <div class="flex justify-between items-center mb-8 border-b pb-4 gap-4">
                        <h2 class="text-2xl font-serif text-midnight flex items-center gap-2">
                            <i class="fas fa-list text-gold"></i> Produtos Cadastrados
                        </h2>
                        <div class="relative w-full md:w-64">
                            <input type="text" id="admin-search" onkeyup="renderTable()" placeholder="Filtrar tabela..." class="w-full bg-gray-50 border border-gray-200 rounded-full py-2 pl-4 pr-10 text-xs focus:border-gold focus:ring-1 focus:ring-gold outline-none">
                            <i class="fas fa-filter absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-midnight text-white uppercase text-[11px] tracking-wider font-semibold">
                                    <th class="p-4 rounded-l-sm">Foto</th>
                                    <th class="p-4">ID</th>
                                    <th class="p-4">Nome</th>
                                    <th class="p-4">Marca</th>
                                    <th class="p-4">Preço</th>
                                    <th class="p-4">Estoque</th>
                                    <th class="p-4 rounded-r-sm">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="product-list" class="text-sm">
                                </tbody>
                        </table>
                        <div id="no-products-msg" class="hidden text-center py-16 text-gray-500 italic">
                            Nenhum produto cadastrado ou correspondente ao filtro.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Puxar produtos do localStorage
        let products = JSON.parse(localStorage.getItem('perfume_products')) || [];
        
        // Variável global para guardar a string base64 da imagem temporariamente
        let currentProductBase64 = "";

        // FUNÇÃO DE CONVERSÃO DE IMAGEM (Turbinada)
        function previewFile() {
            const preview = document.getElementById('img-preview');
            const placeholder = document.getElementById('img-placeholder');
            const btnRemove = document.getElementById('btn-remove-img');
            const file = document.getElementById('prod-image').files[0];
            const reader = new FileReader();

            reader.onloadend = function () {
                currentProductBase64 = reader.result; // Salva a string base64
                preview.src = currentProductBase64;
                
                // Atualiza visualização
                preview.classList.remove('hidden');
                placeholder.classList.add('hidden');
                btnRemove.classList.remove('hidden');
            }

            if (file) {
                // Validação simples de tamanho (opcional, para avisar o usuário)
                if (file.size > 200 * 1024) { // Maior que 200KB
                    if(!confirm("Esta imagem é um pouco grande. Isso pode lotar o espaço do navegador rapidamente se tiver muitos produtos. Deseja continuar mesmo assim? O ideal são imagens menores que 100KB.")) {
                        resetImageInput();
                        return;
                    }
                }
                reader.readAsDataURL(file); // Converte para base64
            } else {
                resetImageInput();
            }
        }

        function removeImage() {
            resetImageInput();
        }

        function resetImageInput() {
            currentProductBase64 = "";
            document.getElementById('prod-image').value = ""; // Limpa input file
            document.getElementById('img-preview').src = "";
            document.getElementById('img-preview').classList.add('hidden');
            document.getElementById('img-placeholder').classList.remove('hidden');
            document.getElementById('btn-remove-img').classList.add('hidden');
        }

        function renderTable() {
            const tbody = document.getElementById('product-list');
            const noMsg = document.getElementById('no-products-msg');
            const searchTerm = document.getElementById('admin-search').value.toLowerCase();
            
            tbody.innerHTML = '';
            
            // Filtra produtos para a tabela admin
            const filteredProducts = products.filter(p => 
                p.name.toLowerCase().includes(searchTerm) || 
                p.brand.toLowerCase().includes(searchTerm) ||
                p.id.toString().includes(searchTerm)
            );

            if (filteredProducts.length === 0) {
                noMsg.classList.remove('hidden');
                return;
            } else {
                noMsg.classList.add('hidden');
            }
            
            filteredProducts.forEach(p => {
                const stockLabel = p.stock > 0 
                    ? `<span class="bg-green-100 text-green-800 text-xs font-bold px-2.5 py-1 rounded-full">${p.stock}</span>` 
                    : `<span class="bg-red-100 text-red-700 text-xs font-bold px-2.5 py-1 rounded-full">Esgotado</span>`;
                
                const imgTag = p.image 
                    ? `<img src="${p.image}" alt="${p.name}" class="w-12 h-12 object-contain p-0.5 border rounded-sm">`
                    : `<div class="w-12 h-12 bg-gray-100 border rounded-sm flex items-center justify-center text-[7px] text-gray-400 font-serif uppercase p-0.5 text-center">sem<br>foto</div>`;

                tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="p-4">${imgTag}</td>
                        <td class="p-4 text-gray-400">#${p.id}</td>
                        <td class="p-4 font-semibold text-midnight">${p.name}</td>
                        <td class="p-4 uppercase text-xs tracking-wider">${p.brand === 'boticario' ? 'Boticário' : 'Brand'}</td>
                        <td class="p-4 font-semibold text-gold">R$ ${parseFloat(p.price).toFixed(2).replace('.', ',')}</td>
                        <td class="p-4">${stockLabel}</td>
                        <td class="p-4">
                            <div class="flex gap-2">
                                <button onclick="editProduct(${p.id})" class="text-blue-500 hover:text-blue-700 p-1.5"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteProduct(${p.id})" class="text-red-400 hover:text-red-600 p-1.5"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById('product-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const idInput = document.getElementById('prod-id').value;
            const name = document.getElementById('prod-name').value;
            const brand = document.getElementById('prod-brand').value;
            const price = parseFloat(document.getElementById('prod-price').value);
            const stock = parseInt(document.getElementById('prod-stock').value);
            // Pega a imagem base64 que está na variável global (pode estar vazia se o usuário removeu/não escolheu foto)
            const image = currentProductBase64; 

            try {
                if(idInput) {
                    // Modo Editar
                    const index = products.findIndex(p => p.id == idInput);
                    // Se não escolher uma nova foto ao editar, mantém a foto antiga (opcional)
                    // No caso atual, se remover a foto no preview, ela é salva como vazia.
                    products[index] = { id: parseInt(idInput), name, brand, price, stock, image };
                } else {
                    // Modo Novo
                    const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
                    products.push({ id: newId, name, brand, price, stock, image });
                }

                // Tenta salvar no LocalStorage (pode falhar se o tamanho exceder 5MB)
                localStorage.setItem('perfume_products', JSON.stringify(products));
                resetForm();
                renderTable();
                alert('Produto salvo com sucesso! Confira na loja.');
            } catch (error) {
                console.error("Erro ao salvar:", error);
                if (error.name === 'QuotaExceededError') {
                    alert('ERRO: Espaço do navegador esgotado!\r\n\r\nNão foi possível salvar este produto com esta imagem. A imagem é muito grande ou o LocalStorage está lotado. Remova produtos antigos ou tente usar uma imagem bem menor (menos que 50KB).');
                } else {
                    alert('Ocorreu um erro inesperado ao salvar o produto.');
                }
            }
        });

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            
            // Atualiza o título do form e muda o foco para o início
            document.getElementById('form-title').innerHTML = `<i class="fas fa-edit text-gold"></i> Editar Perfume #${product.id}`;
            document.getElementById('prod-name').focus();

            // Preenche os campos de texto
            document.getElementById('prod-id').value = product.id;
            document.getElementById('prod-name').value = product.name;
            document.getElementById('prod-brand').value = product.brand;
            document.getElementById('prod-price').value = product.price;
            document.getElementById('prod-stock').value = product.stock;
            
            // Gerencia a pré-visualização da imagem existente
            if (product.image) {
                currentProductBase64 = product.image;
                document.getElementById('img-preview').src = currentProductBase64;
                document.getElementById('img-preview').classList.remove('hidden');
                document.getElementById('img-placeholder').classList.add('hidden');
                document.getElementById('btn-remove-img').classList.remove('hidden');
            } else {
                resetImageInput();
            }
        }

        function deleteProduct(id) {
            if(confirm('Tem certeza absoluta que deseja remover este perfume? Esta ação não pode ser desfeita.')) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('perfume_products', JSON.stringify(products));
                renderTable();
                // Se estava editando o produto excluído, limpa o form
                if(document.getElementById('prod-id').value == id) resetForm();
            }
        }

        function resetForm() {
            document.getElementById('form-title').innerHTML = `<i class="fas fa-plus-circle text-gold"></i> Novo Produto`;
            document.getElementById('prod-id').value = '';
            document.getElementById('product-form').reset();
            resetImageInput();
        }

        // Inicia a tabela
        renderTable();
    </script>
</body>
</html>
